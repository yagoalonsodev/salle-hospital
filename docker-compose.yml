# laSalle Health Center — infraestructura base (día 1)
# Levantar: docker compose up -d
# Los servicios api, ml, dashboard y pipeline se completan en iteraciones posteriores.

services:
  postgres:
    image: postgres:16-alpine
    container_name: salle-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salle_secret}
      POSTGRES_DB: ${POSTGRES_DB:-salle_hospital}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salle} -d ${POSTGRES_DB:-salle_hospital}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salle-net

  minio:
    image: minio/minio:latest
    container_name: salle-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - salle-net

  spark-master:
    image: bitnami/spark:3.5
    container_name: salle-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/data
      - ./pipeline:/opt/pipeline
    networks:
      - salle-net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: salle-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/data
      - ./pipeline:/opt/pipeline
    networks:
      - salle-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: salle-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://salle:salle_secret@postgres:5432/salle_hospital}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml:8001}
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - salle-net
    profiles:
      - app

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: salle-ml
    ports:
      - "8001:8001"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-xray-images}
    depends_on:
      - minio
    volumes:
      - ./ml/models:/app/models
    networks:
      - salle-net
    profiles:
      - app

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: salle-dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - salle-net
    profiles:
      - app

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: salle-pipeline
    environment:
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
      DATABASE_URL: ${DATABASE_URL:-postgresql://salle:salle_secret@postgres:5432/salle_hospital}
    depends_on:
      - spark-master
      - postgres
    volumes:
      - ./data:/opt/data
      - ./pipeline:/opt/pipeline
    networks:
      - salle-net
    profiles:
      - app

volumes:
  postgres_data:
  minio_data:

networks:
  salle-net:
    driver: bridge
