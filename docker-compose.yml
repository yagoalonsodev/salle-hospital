# laSalle Health Center — stack completo
# Arranque: docker compose up -d --build
# Airflow UI: http://localhost:8081  (credenciales en .env → AIRFLOW_ADMIN_*)
#
# macOS (Docker Desktop): si aparece "mount callback failed", los contenedores
# quedan en Created. Recuperación:
#   docker compose start
#   docker compose up -d dashboard
# El dashboard espera a que la API esté healthy para reducir creaciones en paralelo.
#
# MongoDB (logs): credenciales en .env → MONGO_* (mismas que POSTGRES_* en desarrollo)

x-log-env: &log-env
  MONGO_LOG_ENABLED: ${MONGO_LOG_ENABLED:-true}
  MONGO_DB: ${MONGO_DB:-salle_logs}
  MONGODB_URI: mongodb://${MONGO_USER:-${POSTGRES_USER:-salle}}:${MONGO_PASSWORD:-${POSTGRES_PASSWORD:-salle_secret}}@mongodb:27017/${MONGO_DB:-salle_logs}?authSource=admin

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow_secret}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    # Menos workers + más timeout: evita "No response from gunicorn master" en Docker Desktop (RAM limitada)
    AIRFLOW__WEBSERVER__WORKERS: "1"
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-Admin123.}
    _AIRFLOW_WWW_USER_FIRSTNAME: Admin
    _AIRFLOW_WWW_USER_LASTNAME: laSalle
    _AIRFLOW_WWW_USER_EMAIL: admin@lasalle.local
    SPARK_MASTER_URL: spark://spark-master:7077
    DATABASE_URL: postgresql://${POSTGRES_USER:-salle}:${POSTGRES_PASSWORD:-salle_secret}@postgres:5432/${POSTGRES_DB:-salle_hospital}
    ML_SERVICE_URL: http://ml:8001
    API_URL: http://api:8000
    MINIO_ENDPOINT: minio:9000
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    MINIO_BUCKET: ${MINIO_BUCKET:-xray-images}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__LOGGING__FAB_LOGGING_LEVEL: WARNING
    AIRFLOW__LOGGING__LOGGING_CONFIG_CLASS: log_config.LOGGING_CONFIG
    PYTHONPATH: /opt/airflow/config
    _PIP_ADDITIONAL_REQUIREMENTS: docker>=7.0.0
    AIRFLOW_SCRIPTS_DIR: /opt/scripts
    DATA_ROOT: /opt/data
    PIPELINE_CONTAINER: salle-pipeline
    MAX_UPLOAD: "0"
    SERVICE_NAME: airflow
    <<: *log-env
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./scripts:/opt/scripts:ro
    - ./data:/opt/data
    - ./pipeline:/opt/pipeline
    - airflow_metadata:/opt/airflow
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - salle-net

services:
  postgres:
    image: postgres:16-alpine
    container_name: salle-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salle_secret}
      POSTGRES_DB: ${POSTGRES_DB:-salle_hospital}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/01-init-salle-schema.sql:/docker-entrypoint-initdb.d/01-init-salle-schema.sql:ro
      - ./infra/postgres/init-airflow-db.sql:/docker-entrypoint-initdb.d/02-init-airflow-db.sql:ro
      - ./infra/postgres/03-patients-display-name.sql:/docker-entrypoint-initdb.d/03-patients-display-name.sql:ro
      - ./infra/postgres/04-sites-clinical-studies.sql:/docker-entrypoint-initdb.d/04-sites-clinical-studies.sql:ro
      - ./infra/postgres/05-remove-demo-rows.sql:/docker-entrypoint-initdb.d/05-remove-demo-rows.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-salle} -d ${POSTGRES_DB:-salle_hospital}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salle-net

  mongodb:
    image: mongo:7.0
    container_name: salle-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-${POSTGRES_USER:-salle}}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-${POSTGRES_PASSWORD:-salle_secret}}
    volumes:
      - mongo_data:/data/db
      - ./infra/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval "db.adminCommand(''ping'')" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - salle-net

  minio:
    image: minio/minio:latest
    container_name: salle-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - salle-net

  minio-init:
    image: minio/mc:latest
    container_name: salle-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      mc mb -p local/$${MINIO_BUCKET} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-xray-images}
    networks:
      - salle-net

  spark-master:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile
    image: practica-tocha-spark:3.5.3
    container_name: salle-spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/data
      - ./pipeline:/opt/pipeline
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5)\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - salle-net

  spark-worker:
    image: practica-tocha-spark:3.5.3
    container_name: salle-spark-worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/data
      - ./pipeline:/opt/pipeline
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import socket; s=socket.create_connection(('spark-master',7077),5); s.close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - salle-net

  airflow:
    <<: *airflow-common
    container_name: salle-airflow
    # Borra PID obsoleto en el volumen (tras stop/restart); si no, Gunicorn falla y Safari ve "conexión perdida"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        rm -f /opt/airflow/airflow-webserver.pid /opt/airflow/airflow-scheduler.pid 2>/dev/null || true
        exec /usr/bin/dumb-init -- /entrypoint standalone
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: salle-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-salle}:${POSTGRES_PASSWORD:-salle_secret}@postgres:5432/${POSTGRES_DB:-salle_hospital}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml:8001}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-xray-images}
      MINIO_SECURE: "false"
      MODEL_VERSION: rx_resnet50_v1
      ML_REPORT_PATH: /app/ml_reports/training_report_v1.json
      LOG_LEVEL: INFO
      SERVICE_NAME: api
      <<: *log-env
    volumes:
      - ./ml/models/reports:/app/ml_reports:ro
      - ./scripts:/opt/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
      ml:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - salle-net

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: salle-ml
    ports:
      - "8001:8001"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-xray-images}
      DATABASE_URL: postgresql://${POSTGRES_USER:-salle}:${POSTGRES_PASSWORD:-salle_secret}@postgres:5432/${POSTGRES_DB:-salle_hospital}
      MODEL_VERSION: rx_resnet50_v1
      MODEL_PATH: models/rx_resnet50_v1.h5
      LOG_LEVEL: INFO
      SERVICE_NAME: ml
      <<: *log-env
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/models
      - ./scripts:/opt/scripts:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8001/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - salle-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: salle-dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - salle-net

  watcher:
    build:
      context: .
      dockerfile: infra/watcher/Dockerfile
    container_name: salle-watcher
    restart: unless-stopped
    environment:
      DATA_ROOT: /opt/data
      WATCH_INCOMING_DIR: /opt/data/raw/covid19_vs_pneumonia/incoming
      WATCHER_DEBOUNCE_SEC: ${WATCHER_DEBOUNCE_SEC:-2.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-salle}:${POSTGRES_PASSWORD:-salle_secret}@postgres:5432/${POSTGRES_DB:-salle_hospital}
      LOG_LEVEL: INFO
      SERVICE_NAME: watcher
      <<: *log-env
    volumes:
      - ./data:/opt/data
      - ./scripts:/opt/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      spark-master:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/watcher-heartbeat && test $(find /tmp/watcher-heartbeat -mmin -2 | wc -l) -gt 0",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - salle-net

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: salle-pipeline
    environment:
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
      DATABASE_URL: postgresql://${POSTGRES_USER:-salle}:${POSTGRES_PASSWORD:-salle_secret}@postgres:5432/${POSTGRES_DB:-salle_hospital}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-xray-images}
      DATA_ROOT: /opt/data
      MAX_UPLOAD: "0"
      LOG_LEVEL: INFO
      SERVICE_NAME: pipeline
      <<: *log-env
    depends_on:
      spark-master:
        condition: service_started
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./data:/opt/data
      - ./pipeline:/opt/pipeline
      - ./scripts:/opt/scripts:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import socket; s=socket.create_connection(('spark-master',7077),5); s.close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - salle-net

  log-sync:
    build:
      context: .
      dockerfile: infra/log-sync/Dockerfile
    container_name: salle-log-sync
    restart: unless-stopped
    environment:
      SERVICE_NAME: log-sync
      AIRFLOW_LOG_DIR: /opt/airflow/logs
      EXTRA_LOG_DIRS: /opt/logs
      LOG_SYNC_INTERVAL_SEC: ${LOG_SYNC_INTERVAL_SEC:-60}
      <<: *log-env
    volumes:
      - ./airflow/logs:/opt/airflow/logs:ro
      - ./logs:/opt/logs:ro
      - ./scripts:/opt/scripts:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - salle-net

volumes:
  postgres_data:
  minio_data:
  mongo_data:
  airflow_metadata:

networks:
  salle-net:
    driver: bridge
